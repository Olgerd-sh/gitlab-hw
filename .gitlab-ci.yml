stages:
  - build
  - test

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    # Отключаем обязательный TLS, чтобы избежать сетевых ошибок внутри GitLab Runner
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build .

test:
  stage: test
  image: golang:1.17
  script:
    # Инициализируем модуль на лету, если его вдруг нет в репозитории (защита от падения go test)
    - if [ ! -f go.mod ]; then go mod init myproject; fi
    # Запускаем тесты для текущей папки
    - go test ./...

